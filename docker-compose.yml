version: '3.8'

services:
  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: anmicius-postgres
    environment:
      POSTGRES_USER: anmicius
      POSTGRES_PASSWORD: anmicius_secret_password
      POSTGRES_DB: anmicius_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anmicius -d anmicius_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - anmicius-network

  # Redis (кэширование)
  redis:
    image: redis:7-alpine
    container_name: anmicius-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - anmicius-network

  # MinIO (S3-compatible storage)
  minio:
    image: minio/minio:latest
    container_name: anmicius-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_SERVER_URL: http://minio:9000
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - anmicius-network

  # MinIO Client (для создания бакета при старте)
  minio-init:
    image: minio/mc:latest
    container_name: anmicius-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/anmicius-media --ignore-existing;
      mc anonymous set download myminio/anmicius-media;
      exit 0;
      "
    networks:
      - anmicius-network

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anmicius-api
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-anmicius}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-anmicius_secret_password}
      POSTGRES_DB: ${POSTGRES_DB:-anmicius_db}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-anmicius-media}
      DEBUG: ${DEBUG:-false}
    volumes:
      - ./app:/app/app
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - anmicius-network
    restart: unless-stopped

  # Nginx (Reverse Proxy + SSL)
  nginx:
    image: nginx:alpine
    container_name: anmicius-nginx
    ports:
      - "80:80"
      - "443:443"
      - "4443:4443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/www:/var/www
      - ./nginx/logs:/var/log/nginx
      - ./admin-panel/dist:/admin-panel/dist:ro
      - certbot_etc:/etc/letsencrypt
    depends_on:
      - api
      - minio
    networks:
      - anmicius-network
    restart: unless-stopped

  # Certbot (SSL сертификаты)
  certbot:
    image: certbot/certbot
    container_name: anmicius-certbot
    volumes:
      - ./nginx/www:/var/www
      - certbot_etc:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - anmicius-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  certbot_etc:
    driver: local

networks:
  anmicius-network:
    driver: bridge
