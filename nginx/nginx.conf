# Nginx конфигурация с SSL

# Resolver для Docker DNS
resolver 127.0.0.11 valid=30s ipv6=off;

# Map для WebSocket
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Upstream для API
upstream api_backend {
    server anmicius-api:8000;
}

# Upstream для MinIO
upstream minio_backend {
    server anmicius-minio:9000;
}

# Upstream для MinIO Console
upstream minio_console_backend {
    server anmicius-minio:9001;
}

# HTTP сервер - редирект на HTTPS и acme-challenge для Certbot
server {
    listen 80;
    server_name anmicius.ru www.anmicius.ru;

    location /.well-known/acme-challenge/ {
        root /var/www;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 80;
    server_name api.anmicius.ru;

    location /.well-known/acme-challenge/ {
        root /var/www;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 80;
    server_name admin.anmicius.ru;

    location /.well-known/acme-challenge/ {
        root /var/www;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 80;
    server_name minio.anmicius.ru;

    location /.well-known/acme-challenge/ {
        root /var/www;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS сервер для основного домена
server {
    listen 443 ssl http2;
    server_name anmicius.ru www.anmicius.ru;

    ssl_certificate /etc/letsencrypt/live/api.anmicius.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.anmicius.ru/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    location / {
        return 301 https://anmicius.ru$request_uri;
    }
}

# HTTPS сервер для API
server {
    listen 443 ssl http2;
    server_name api.anmicius.ru;

    ssl_certificate /etc/letsencrypt/live/api.anmicius.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.anmicius.ru/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTPS сервер для Admin панели - раздача статических файлов
server {
    listen 443 ssl http2;
    server_name admin.anmicius.ru;

    ssl_certificate /etc/letsencrypt/live/admin.anmicius.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.anmicius.ru/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /admin-panel/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Проксирование API запросов с преобразованием путей
    location /api/v1/auth/ {
        rewrite ^/api/v1/auth/(.*) /auth/$1 break;
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/admin/ {
        rewrite ^/api/v1/admin/(.*) /admin/$1 break;
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/ {
        rewrite ^/api/v1/(.*) /$1 break;
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTPS сервер для MinIO (основной интерфейс)
server {
    listen 443 ssl http2;
    server_name minio.anmicius.ru;

    ssl_certificate /etc/letsencrypt/live/minio.anmicius.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/minio.anmicius.ru/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Включаем сжатие
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    location / {
        proxy_pass http://minio_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;

        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;

        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }
}

# HTTPS сервер для MinIO Console (порт 9001)
server {
    listen 4443 ssl http2;
    server_name minio.anmicius.ru;

    ssl_certificate /etc/letsencrypt/live/minio.anmicius.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/minio.anmicius.ru/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Включаем сжатие для MinIO Console
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # WebSocket для MinIO Console
    location /ws/ {
        proxy_pass http://minio_console_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;

        # Важно для WebSocket через SSL
        proxy_set_header Origin "";

        # Таймауты для WebSocket
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;

        # Отключаем буферизацию для WebSocket
        proxy_buffering off;
        proxy_cache off;

        # Отключаем пересылку CORS заголовков
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
    }

    location / {
        proxy_pass http://minio_console_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;

        # Увеличиваем таймауты для долгих операций
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;

        # Увеличиваем размеры буферов
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }
}
